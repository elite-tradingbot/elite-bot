<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteTradeBot | Official Store</title>
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #ffcc00;
            --bg: #03060a; 
            --card-bg: #0b1118;
            --text: #f0f6fc;
            --text-dim: #8b949e;
            --whatsapp: #25d366;
            --telegram: #0088cc;
            --instagram: #e1306c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            text-align: center;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        /* SIMPLE LOGO SETTINGS */
        .header-logo {
            max-width: 300px; /* Reduced size for better mobile fit */
            width: 80%;
            height: auto;
            margin: 20px auto;
            display: block;
        }

        .action-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 255, 204, 0.2);
            padding: 40px 20px;
            border-radius: 25px;
            display: inline-block;
            margin: 30px 0;
        }

        .price-tag { font-size: 4rem; color: var(--secondary); font-weight: 900; }

        .btn-buy {
            background: linear-gradient(135deg, var(--primary), #00d4ff);
            color: #000;
            padding: 20px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            display: inline-block;
            margin-top: 20px;
        }

        .social-btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }
        .tg { background: var(--telegram); }
        .ig { background: var(--instagram); }

        footer { margin-top: 80px; padding: 40px; color: #484f58; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <!-- CHANGE YOUR FILE NAME TO logo.png.jpeg TO MATCH THIS -->
        <img src="logo.png.jpeg" alt="EliteTradeBot Logo" class="header-logo">
        <p style="color: var(--text-dim);">Premium Automated Trading Logic</p>
    </header>

    <div class="action-card">
        <div style="background:white; color:#1a1f71; display:inline-block; padding:2px 10px; font-weight:900; border-radius:4px; font-size:0.8rem;">VISA / CARD</div><br>
        <span class="price-tag">$32.00</span>
        <p>Full XML Bot + Setup Guide</p>
        <a href="https://wa.me/18763047407?text=Hello,%20I%20want%20to%20buy%20the%20Elite%20Trade%20Bot." class="btn-buy">BUY ON WHATSAPP</a>
    </div>

    <div class="socials">
        <a href="https://t.me/elite_TradingBot" class="social-btn tg">Telegram</a>
        <a href="https://instagram.com/elite_TradingBot" class="social-btn ig">Instagram</a>
    </div>
</div>

<footer>
    <p>&copy; 2026 EliteTradeBot | Mandeville, Jamaica</p>
</footer>

</body>
</html>
